<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Main Container -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#logo-gradient)" />
  
  <!-- TV Frame -->
  <path d="M128 176C128 158.327 142.327 144 160 144H352C369.673 144 384 158.327 384 176V336C384 353.673 369.673 368 352 368H160C142.327 368 128 353.673 128 336V176Z" fill="white" fill-opacity="0.15" stroke="white" stroke-width="24" stroke-linejoin="round" />
  
  <!-- Antennas -->
  <path d="M216 144L176 80M296 144L336 80" stroke="white" stroke-width="24" stroke-linecap="round" />
  
  <!-- Signal Waves (IPTV Vibe) -->
  <path d="M256 210L300 256L256 302" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M216 210L260 256L216 302" stroke="white" stroke-width="12" stroke-opacity="0.6" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Z Accent at the bottom right -->
